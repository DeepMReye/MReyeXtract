# Runs the same checks as format_and_test.sh on every PR and on pushes to
# main. Configure these jobs as required status checks in the branch
# protection rules for main so nothing merges (and therefore nothing
# releases) from a red build.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Format check (black)
        run: python -m black --check src

      - name: Type check (mypy)
        run: python -m mypy src

      - name: Lint (pylint)
        run: python -m pylint src

      - name: Tests
        run: python -m pytest tests
